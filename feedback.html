<!DOCTYPE html>

<html>
<head>
<title>BMW Feedback</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="page-title">Customer Feedback</h1>

<div class="booking-form">

<form onsubmit="return feedbackSubmit()">

<label>Full Name</label> <input type="text" placeholder="Enter your name" required>

<label>Email</label> <input type="email" placeholder="Enter your email" required>

<label>How was your experience?</label>

<select required>
<option value="">Select Rating</option>
<option>Excellent</option>
<option>Very Good</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<label>Which BMW Model Interested You?</label> <input type="text" placeholder="Enter BMW model">

<label>Your Feedback</label>

<textarea placeholder="Write your feedback here..." rows="4" required></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

<p style="text-align:center;margin-top:20px;">
<a href="index.html">Back to Home</a>
</p>

<script>

function feedbackSubmit(){
alert("Thank you for your feedback!");
return true;
}

</script>

</body>
</html>
