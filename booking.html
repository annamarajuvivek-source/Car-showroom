<!DOCTYPE html>

<html>
<head>
<title>BMW Booking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="page-title">BMW Car Booking</h1>

<div class="booking-form">

<form onsubmit="return bookingSuccess()">

<label>Full Name</label> <input type="text" placeholder="Enter your name" required>

<label>Email</label> <input type="email" placeholder="Enter your email" required>

<label>Phone Number</label> <input type="text" placeholder="Enter phone number" required>

<label>Select BMW Model</label>

<select>
<option>X1</option>
<option>X3</option>
<option>X5</option>
<option>X6</option>
<option>X7</option>
<option>3 Series</option>
<option>5 Series</option>
<option>7 Series</option>
<option>M5</option>
<option>i7</option>
<option>M2</option>
<option>M4</option>
<option>4 Series Coupe</option>
<option>8 Series Coupe</option>
<option>M8 Coupe</option>
<option>Z4 Roadster</option>
<option>4 Series Convertible</option>
<option>M4 Convertible</option>
<option>8 Series Convertible</option>
<option>M8 Convertible</option>
<option>i4</option>
<option>i5</option>
<option>iX</option>
<option>iX1</option>
</select>

<label>Preferred Color</label> <input type="text" placeholder="Enter color">

<label>When do you want delivery?</label> <input type="date" required>

<label>Address</label> <input type="text" placeholder="Enter your address">

<button type="submit">Submit Booking</button>

</form>

</div>

<script>

function bookingSuccess()
{
alert("Booking Submitted Successfully! BMW Team will contact you soon.");
return true;
}

</script>

</body>
</html>
